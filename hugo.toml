baseURL = "https://arch-linux.cz/"
defaultContentLanguage = "cs"
theme = "blowfish"

# Blowfish defaultně načítá další configy
[languages]
  [languages.cs]
    languageName = "Čeština"
    languageCode = "cs"
    weight = 1
    title = "Arch Linux CZ"

    [languages.cs.params]
      logo = "img/logo.png"
      description = "Česká komunita Arch Linuxu"

      [languages.cs.params.author]
        name = "Arch Linux CZ"
        headline = "Česká komunita Arch Linuxu"
        bio = "Návody, novinky a podpora pro uživatele Arch Linuxu v češtině."
        links = [
          { fediverse = "https://gts.arch-linux.cz/@arch" },
          { gitea = "https://git.arch-linux.cz/ArchlinuxCz" },
          { matrix = "https://matrix.to/#/#archlinuxcz:matrix.org" },
          { rss = "/index.xml" }
        ]

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true
  mainSections = ["posts"]
  showAppearanceSwitcher = true
  showScrollToTop = true

  [params.homepage]
    layout = "background"
    homepageImage = ""
    showRecent = true
    showRecentItems = 5
    showMoreLink = true

  [params.article]
    showDate = true
    showAuthor = true
    showReadingTime = true
    showTaxonomies = true
    showTableOfContents = true
    showPagination = true
    showComments = false

  [params.list]
    showHero = false
    showBreadcrumbs = true
    showSummary = true
    showTableOfContents = false
    showCards = true
    groupByYear = false
    paginationWidth = 1

  [params.footer]
    showCopyright = true
    showThemeAttribution = true

[[menu.main]]
  name = "Domů"
  pageRef = "/"
  weight = 1

[[menu.main]]
  name = "Návody"
